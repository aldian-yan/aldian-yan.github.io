<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">

    <title>Under Construction - Aldian</title>
    <!-- Menggunakan font modern yang mirip dengan template Anda -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Pengaturan Dasar */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #111111;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER / NAVBAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 80px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0; /* Garis abu-abu tipis di bawah menu */
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #000000;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #555555;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #000000;
        }

        .dark-mode-toggle {
            font-size: 20px;
            cursor: pointer;
            color: #111;
        }

        /* KONTEN UNDER CONSTRUCTION */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .sub-heading {
            color: #3b82f6; /* Warna biru template */
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            margin: 0 0 20px 0;
            letter-spacing: -2px;
            color: #111111;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: #666666;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* TOMBOL (Sama seperti template) */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-primary {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background-color: #333333;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #111111;
            padding: 16px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #eaeaea;
            transition: border-color 0.3s;
        }

        .btn-secondary:hover {
            border-color: #cccccc;
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 20px; }
            nav ul { flex-wrap: wrap; justify-content: center; gap: 20px; }
            h1 { font-size: 42px; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- BAGIAN HEADER NAVIGASI -->


    <!-- BAGIAN KONTEN UTAMA -->
    <main>
        <div class="sub-heading">SYSTEM UPDATE | UNDER CONSTRUCTION</div>
        <h1>Coming Soon.</h1>
        <p>
            This page is currently under development. I am preparing and curating my track record regarding technical reporting for well operations and my latest project documentation.
        </p>
        
        <div class="button-group">
            <a href="index.html" class="btn-primary">Back to Home &rarr;</a>
            <a href="mailto:aldiansgb@gmail.com" class="btn-secondary">Let's Talk</a>
        </div>
    </main>

</body>
</html>
